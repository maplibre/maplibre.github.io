    <text x="480" y="526" fill="#ffffff" opacity="0.55" filter="url(#glow)">PostGIS</text>
    <text x="480" y="526" fill="#ffffff">PostGIS</text>
  </g>
  <text x="480" y="656" text-anchor="middle" fill="#ffffff"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="80" font-weight="500" opacity="0.92">datasource</text>
