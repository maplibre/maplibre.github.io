<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" role="img" aria-label="MLT format evolution">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="960" height="960" fill="#111725"/>
  <g text-anchor="middle"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     font-size="105" font-weight="900">
    <text x="480" y="500" fill="#95BEFA" opacity="0.55" filter="url(#glow)">format evolution</text>
    <text x="480" y="500" fill="#ffffff">format evolution</text>
  </g>
  <text x="480" y="620" text-anchor="middle" fill="#95BEFA"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="60" font-weight="500" opacity="0.92">post-1.0 spec extensions</text>
</svg>
